<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Nightdrift</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0c18;
      --bg2:      #10132a;
      --purple:   #b8a9f8;
      --purple-dk:#1a1235;
      --teal:     #7ec8c8;
      --text:     #e8e4f0;
      --muted:    #7a7898;
      --surface:  rgba(255,255,255,0.045);
      --border:   rgba(255,255,255,0.08);
    }

    html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100%; overflow: hidden; }

    #root { height: 100%; display: flex; justify-content: center; align-items: flex-start; background: var(--bg); }

    .shell {
      width: 100%; max-width: 390px; height: 100dvh;
      position: relative; overflow: hidden; background: var(--bg);
    }

    /* ── Screen transition: fade up ── */
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      opacity: 0; transform: translateY(18px);
      pointer-events: none;
      transition: opacity 0.5s ease, transform 0.5s ease;
      overflow-y: auto; overflow-x: hidden;
    }
    .screen.active { opacity: 1; transform: translateY(0); pointer-events: all; }
    .screen.exit    { opacity: 0; transform: translateY(-12px); }

    /* ─────────────────────────────────────
       SCREEN 1 — LANDING
    ───────────────────────────────────── */
    .s1 { background: var(--bg); }
    .stars-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 0; }

    .s1-body {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 64px 28px 48px; min-height: 100%;
    }

    .moon-wrap {
      width: 88px; height: 88px; margin-bottom: 32px;
      position: relative;
      filter: drop-shadow(0 0 28px rgba(255,210,100,0.35));
      animation: moon-float 5s ease-in-out infinite;
    }
    @keyframes moon-float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }
    .moon-svg { width: 100%; height: 100%; }

    .eyebrow {
      font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--purple); margin-bottom: 16px; font-weight: 500;
    }

    .headline {
      font-family: 'Fraunces', serif; font-weight: 300;
      font-size: 38px; line-height: 1.18; text-align: center;
      color: var(--text); margin-bottom: 18px;
    }
    .headline em { font-style: italic; color: var(--purple); }

    .subline {
      font-size: 15px; line-height: 1.7; text-align: center;
      color: var(--muted); max-width: 290px; margin-bottom: 32px;
    }

    .pills { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 44px; }
    .pill {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 999px; padding: 7px 16px;
      font-size: 13px; color: var(--muted);
    }

    .btn-primary {
      width: 100%; max-width: 320px;
      padding: 18px 24px; border-radius: 999px; border: none;
      background: var(--purple); color: var(--purple-dk);
      font-family: 'DM Sans', sans-serif; font-size: 17px; font-weight: 600;
      cursor: pointer; letter-spacing: 0.01em;
      box-shadow: 0 0 32px rgba(184,169,248,0.4), 0 4px 20px rgba(184,169,248,0.2);
      transition: transform 0.12s, box-shadow 0.2s;
      margin-bottom: 20px;
    }
    .btn-primary:active { transform: scale(0.97); }

    .footer-note { font-size: 13px; color: var(--muted); text-align: center; }

    /* ─────────────────────────────────────
       SCREEN 2 — NUDGE
    ───────────────────────────────────── */
    .s2 { background: var(--bg2); }
    .s2-body {
      display: flex; flex-direction: column; align-items: center;
      padding: 0 28px 52px; min-height: 100%; position: relative;
    }

    /* Ripple */
    .ripple-stage {
      position: relative; width: 240px; height: 240px;
      margin-top: 52px; margin-bottom: 36px; flex-shrink: 0;
    }
    .ripple-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 1.5px solid rgba(184,169,248,0.18);
      animation: ripple 3.5s ease-out infinite;
    }
    .ripple-ring:nth-child(2) { animation-delay: 1.16s; }
    .ripple-ring:nth-child(3) { animation-delay: 2.33s; }
    @keyframes ripple {
      0%   { transform: scale(0.45); opacity: 0.7; }
      100% { transform: scale(1.55); opacity: 0; }
    }
    .ripple-center {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(184,169,248,0.08);
      border: 1px solid rgba(184,169,248,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
    }

    .time-label { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .big-time {
      font-family: 'Fraunces', serif; font-weight: 300;
      font-size: 52px; line-height: 1; color: var(--text);
      margin-bottom: 20px; letter-spacing: -0.02em;
    }
    .s2-subline {
      font-size: 15px; line-height: 1.65; text-align: center;
      color: var(--muted); max-width: 280px; margin-bottom: 28px;
    }

    .offer-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 18px 20px;
      display: flex; align-items: center; gap: 14px;
      width: 100%; margin-bottom: 32px;
    }
    .offer-icon { font-size: 26px; flex-shrink: 0; }
    .offer-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .offer-sub   { font-size: 13px; color: var(--muted); }

    .btn-ghost-sm {
      background: none; border: none; padding: 10px;
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 13px; cursor: pointer; letter-spacing: 0.01em;
    }

    /* ─────────────────────────────────────
       SCREEN 3 — MOOD
    ───────────────────────────────────── */
    .s3 { background: var(--bg); }
    .s3-body {
      display: flex; flex-direction: column; align-items: center;
      padding: 56px 24px 48px; min-height: 100%;
    }

    .s3-eyebrow { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; font-weight: 500; }
    .s3-headline {
      font-family: 'Fraunces', serif; font-weight: 300; font-style: italic;
      font-size: 28px; line-height: 1.3; text-align: center;
      color: var(--text); margin-bottom: 10px;
    }
    .s3-sub { font-size: 14px; color: var(--muted); text-align: center; margin-bottom: 32px; }

    .mood-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; width: 100%; margin-bottom: 28px;
    }
    .mood-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 16px; padding: 18px 14px;
      cursor: pointer; transition: border-color 0.2s, background 0.2s;
      text-align: left;
    }
    .mood-card:active { transform: scale(0.97); }
    .mood-card.sel-purple { border-color: var(--purple); background: rgba(184,169,248,0.08); }
    .mood-card.sel-teal   { border-color: var(--teal);   background: rgba(126,200,200,0.08); }
    .mood-emoji { font-size: 26px; display: block; margin-bottom: 10px; }
    .mood-name  { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .mood-desc  { font-size: 12px; color: var(--muted); line-height: 1.45; }

    /* Recommended sounds strip */
    .rec-strip {
      width: 100%; margin-bottom: 28px;
      animation: fade-up-in 0.35s ease both;
    }
    @keyframes fade-up-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .rec-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .sound-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      border-radius: 999px; padding: 7px 14px; font-size: 13px;
      font-family: 'DM Sans', sans-serif; border: 1px solid transparent;
      cursor: default;
    }
    .chip.hi-purple { background: rgba(184,169,248,0.15); border-color: rgba(184,169,248,0.35); color: var(--purple); }
    .chip.hi-teal   { background: rgba(126,200,200,0.15); border-color: rgba(126,200,200,0.35); color: var(--teal); }
    .chip.lo        { background: var(--surface); border-color: var(--border); color: var(--muted); }

    /* ─────────────────────────────────────
       SCREEN 4 — PLAYER
    ───────────────────────────────────── */
    .s4 { background: var(--bg); }
    .s4-body {
      display: flex; flex-direction: column; align-items: center;
      padding: 44px 24px 48px; min-height: 100%;
    }

    .s4-eyebrow { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 28px; }

    /* Vinyl */
    .vinyl-wrap { position: relative; width: 180px; height: 180px; margin-bottom: 22px; }
    .vinyl {
      width: 180px; height: 180px; border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        #161928 0%, #1f2240 8%, #161928 16%, #1f2240 24%,
        #161928 32%, #1f2240 40%, #161928 48%, #1f2240 56%,
        #161928 64%, #1f2240 72%, #161928 80%, #1f2240 88%, #161928 100%
      );
      box-shadow: 0 8px 36px rgba(0,0,0,0.55), 0 0 0 1.5px rgba(255,255,255,0.06);
    }
    .vinyl.spin { animation: vinyl-spin 4s linear infinite; }
    @keyframes vinyl-spin { to { transform: rotate(360deg); } }
    .vinyl-hole {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 0 2px rgba(126,200,200,0.18);
    }

    .track-name {
      font-family: 'Fraunces', serif; font-weight: 300;
      font-size: 24px; color: var(--text); text-align: center; margin-bottom: 4px;
    }
    .track-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 22px; }

    /* EQ bars */
    .eq { display: flex; align-items: flex-end; gap: 3px; height: 24px; margin-bottom: 22px; }
    .eq-b {
      width: 4px; border-radius: 2px; background: var(--teal);
      opacity: 0.75; min-height: 3px;
    }
    .eq-b.live { animation: eq 0.6s ease-in-out infinite alternate; }
    .eq-b:nth-child(1){animation-duration:0.45s}.eq-b:nth-child(2){animation-duration:0.62s}
    .eq-b:nth-child(3){animation-duration:0.38s}.eq-b:nth-child(4){animation-duration:0.72s}
    .eq-b:nth-child(5){animation-duration:0.52s}.eq-b:nth-child(6){animation-duration:0.68s}
    .eq-b:nth-child(7){animation-duration:0.42s}
    @keyframes eq { from { height: 3px; } to { height: 20px; } }

    /* Sound grid */
    .sound-section { width: 100%; margin-bottom: 24px; }
    .sound-sec-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .sound-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .sound-pill {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 999px; padding: 9px 16px;
      font-size: 13px; font-family: 'DM Sans', sans-serif;
      color: var(--muted); cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .sound-pill.active-teal { background: rgba(126,200,200,0.12); border-color: var(--teal); color: var(--teal); }
    .sound-pill.active-purple { background: rgba(184,169,248,0.12); border-color: var(--purple); color: var(--purple); }

    /* THE play button — unmissable */
    .play-btn {
      width: 68px; height: 68px; border-radius: 50%; border: none;
      background: var(--teal); color: var(--bg);
      font-size: 26px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 8px rgba(126,200,200,0.12), 0 0 32px rgba(126,200,200,0.4);
      transition: transform 0.12s, box-shadow 0.2s;
      margin-bottom: 20px; flex-shrink: 0;
    }
    .play-btn:active { transform: scale(0.94); }

    .timer-row { display: flex; gap: 28px; font-size: 13px; color: var(--muted); margin-bottom: 20px; font-variant-numeric: tabular-nums; }

    .btn-outline-sm {
      background: none; border: 1px solid var(--border);
      border-radius: 999px; padding: 11px 24px;
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 14px; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-outline-sm:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }

    /* ─────────────────────────────────────
       SCREEN 5 — GOODNIGHT
    ───────────────────────────────────── */
    .s5 { background: var(--bg); }
    .s5-glow {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 55% 40% at 50% 50%, rgba(184,169,248,0.12) 0%, transparent 70%);
    }
    .s5-body {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 36px; min-height: 100%; text-align: center;
    }
    .s5-moon { font-size: 60px; margin-bottom: 36px; filter: drop-shadow(0 0 24px rgba(184,169,248,0.45)); }
    .s5-message {
      font-family: 'Fraunces', serif; font-weight: 300; font-style: italic;
      font-size: 22px; line-height: 1.55; color: var(--text);
      max-width: 290px; margin-bottom: 48px;
    }
    .btn-ghost {
      padding: 15px 40px; border-radius: 999px;
      background: transparent; border: 1px solid rgba(184,169,248,0.4);
      color: var(--purple); font-family: 'DM Sans', sans-serif;
      font-size: 16px; font-weight: 500; cursor: pointer;
      transition: background 0.2s, transform 0.12s;
      margin-bottom: 20px;
    }
    .btn-ghost:active { transform: scale(0.97); }
    .s5-footer { font-size: 13px; color: var(--muted); }

    /* Dim overlay */
    .dim { position: fixed; inset: 0; background: #000; z-index: 999; opacity: 0; pointer-events: none; transition: opacity 1.8s ease; }
    .dim.on { opacity: 1; pointer-events: all; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const SESSION = 20 * 60;

const SOUNDS = {
  stressed: [
    { id: 'heavy-rain',   label: '🌧️ Heavy rain',   sub: 'for stress relief' },
    { id: 'thunderstorm', label: '⛈️ Thunderstorm',  sub: 'for stress relief' },
    { id: 'big-waves',    label: '🌊 Big waves',      sub: 'for stress relief' },
  ],
  calm: [
    { id: 'soft-rain',    label: '🌦️ Soft rain',     sub: 'for gentle sleep' },
    { id: 'forest-night', label: '🌲 Forest night',  sub: 'for gentle sleep' },
    { id: 'gentle-waves', label: '🌊 Gentle waves',  sub: 'for gentle sleep' },
  ],
};

const MOOD_RECS = {
  stressed: { hi: ['🌧️ Heavy rain', '⛈️ Thunderstorm', '🌊 Big waves'], lo: ['🌦️ Soft rain', '🌲 Forest night'] },
  anxious:  { hi: ['🌧️ Heavy rain', '⛈️ Thunderstorm', '🌊 Big waves'], lo: ['🌦️ Soft rain', '🌲 Forest night'] },
  tired:    { hi: ['🌦️ Soft rain', '🌲 Forest night', '🌊 Gentle waves'], lo: ['🌧️ Heavy rain', '⛈️ Thunderstorm'] },
  calm:     { hi: ['🌦️ Soft rain', '🌲 Forest night', '🌊 Gentle waves'], lo: ['🌧️ Heavy rain', '⛈️ Thunderstorm'] },
};

const MOODS = [
  { id: 'stressed', emoji: '😮‍💨', name: 'Stressed',     desc: 'Mind still racing from the day',    group: 'intense' },
  { id: 'anxious',  emoji: '😟', name: 'Anxious',      desc: "Overthinking, can't switch off",    group: 'intense' },
  { id: 'tired',    emoji: '😴', name: 'Just tired',   desc: 'Ready to drift, need a nudge',       group: 'soft' },
  { id: 'calm',     emoji: '😌', name: 'Already calm', desc: 'Just want something soft to sleep to', group: 'soft' },
];

const GOODNIGHTS = [
  'That was yours.\nAll of it. Sleep well.',
  'You gave yourself something tonight.\nGood.',
  'Rest earned.\nPhone down. Goodnight.',
  'Tomorrow starts with tonight.\nYou did well.',
  'No guilt. No scroll.\nJust sleep.',
];

function fmt(s) {
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

/* ── Stars ── */
function Stars() {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current, ctx = c.getContext('2d');
    let raf;
    const resize = () => { c.width = c.offsetWidth; c.height = c.offsetHeight; };
    resize();
    const stars = Array.from({length:100},()=>({
      x: Math.random(), y: Math.random(),
      r: Math.random()*1.3+0.2,
      phase: Math.random()*Math.PI*2,
      speed: Math.random()*0.0025+0.0008,
    }));
    const draw = t => {
      ctx.clearRect(0,0,c.width,c.height);
      stars.forEach(s => {
        const a = 0.15 + 0.6*Math.abs(Math.sin(t*s.speed+s.phase));
        ctx.beginPath();
        ctx.arc(s.x*c.width, s.y*c.height, s.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(232,228,240,${a})`;
        ctx.fill();
      });
      raf = requestAnimationFrame(draw);
    };
    raf = requestAnimationFrame(draw);
    window.addEventListener('resize', resize);
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, []);
  return <canvas ref={ref} className="stars-canvas" />;
}

/* ── Moon SVG ── */
function Moon() {
  return (
    <svg className="moon-svg" viewBox="0 0 88 88" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="44" cy="44" r="36" fill="#f5c842"/>
      <circle cx="44" cy="44" r="36" fill="url(#moonGrad)"/>
      {/* craters */}
      <circle cx="34" cy="36" r="5.5" fill="rgba(0,0,0,0.12)"/>
      <circle cx="54" cy="50" r="4"   fill="rgba(0,0,0,0.10)"/>
      <circle cx="30" cy="54" r="3"   fill="rgba(0,0,0,0.09)"/>
      <circle cx="52" cy="32" r="2.5" fill="rgba(0,0,0,0.08)"/>
      {/* highlight */}
      <ellipse cx="36" cy="34" rx="9" ry="6" fill="rgba(255,255,255,0.18)" transform="rotate(-20 36 34)"/>
      <defs>
        <radialGradient id="moonGrad" cx="38%" cy="35%" r="65%">
          <stop offset="0%" stopColor="#ffe082"/>
          <stop offset="100%" stopColor="#e6a800" stopOpacity="0.4"/>
        </radialGradient>
      </defs>
    </svg>
  );
}

/* ── Clock ── */
function Clock() {
  const [t, setT] = useState('');
  useEffect(() => {
    const f = () => {
      const d = new Date(), h = d.getHours()%12||12, m = String(d.getMinutes()).padStart(2,'0');
      setT(`${h}:${m} ${d.getHours()>=12?'pm':'am'}`);
    };
    f(); const id = setInterval(f, 10000);
    return () => clearInterval(id);
  }, []);
  return <div className="big-time">{t}</div>;
}

/* ── EQ ── */
function EQ({ playing }) {
  const heights = [18,12,22,8,20,14,10];
  return (
    <div className="eq">
      {heights.map((h,i) => (
        <div key={i} className={`eq-b ${playing?'live':''}`} style={{height: playing ? undefined : `${h*0.25}px`}} />
      ))}
    </div>
  );
}

/* ── App ── */
function App() {
  const [screen,   setScreen]   = useState(1);
  const [mood,     setMood]     = useState(null);
  const [track,    setTrack]    = useState(null);
  const [playing,  setPlaying]  = useState(false);
  const [elapsed,  setElapsed]  = useState(0);
  const [dimming,  setDimming]  = useState(false);
  const [message]               = useState(() => GOODNIGHTS[Math.floor(Math.random()*GOODNIGHTS.length)]);
  const timerRef = useRef(null);

  const isIntense = mood && (mood==='stressed'||mood==='anxious');
  const soundSet  = isIntense ? SOUNDS.stressed : SOUNDS.calm;
  const activeColor = isIntense ? 'purple' : 'teal';

  // set default track when mood is chosen
  useEffect(() => {
    if (mood) setTrack(soundSet[0].id);
  }, [mood]);

  // timer
  useEffect(() => {
    if (playing) {
      timerRef.current = setInterval(() => {
        setElapsed(e => {
          if (e+1 >= SESSION) { clearInterval(timerRef.current); setPlaying(false); goTo(5); return SESSION; }
          return e+1;
        });
      }, 1000);
    } else { clearInterval(timerRef.current); }
    return () => clearInterval(timerRef.current);
  }, [playing]);

  // reset timer on leaving player
  useEffect(() => {
    if (screen !== 4) { setPlaying(false); setElapsed(0); }
  }, [screen]);

  const goTo = n => setScreen(n);

  const handleGoodnight = () => {
    setDimming(true);
    setTimeout(() => { setDimming(false); setScreen(1); setMood(null); setTrack(null); }, 3000);
  };

  const currentTrack = soundSet.find(s => s.id === track) || soundSet[0];
  const remaining = SESSION - elapsed;

  const moodCard = id => {
    const m = MOODS.find(m=>m.id===id);
    const selClass = mood===id ? (m.group==='intense'?'sel-purple':'sel-teal') : '';
    return (
      <div key={id} className={`mood-card ${selClass}`} onClick={() => setMood(id)}>
        <span className="mood-emoji">{m.emoji}</span>
        <div className="mood-name">{m.name}</div>
        <div className="mood-desc">{m.desc}</div>
      </div>
    );
  };

  return (
    <div className="shell">

      {/* ── Screen 1 ── */}
      <div className={`screen s1 ${screen===1?'active':''}`}>
        <Stars/>
        <div className="s1-body">
          <div className="moon-wrap"><Moon/></div>
          <div className="eyebrow">Nightdrift</div>
          <h1 className="headline">Your phone, but <em>slower.</em></h1>
          <p className="subline">You deserve that quiet moment before sleep. Nightdrift gives it back — without the scroll.</p>
          <div className="pills">
            <span className="pill">No guilt</span>
            <span className="pill">No effort</span>
            <span className="pill">Just you</span>
          </div>
          <button className="btn-primary" onClick={()=>goTo(2)}>Try tonight →</button>
          <p className="footer-note">No sign-up needed.</p>
        </div>
      </div>

      {/* ── Screen 2 ── */}
      <div className={`screen s2 ${screen===2?'active':''}`}>
        <div className="s2-body">
          <div className="ripple-stage">
            <div className="ripple-ring"/><div className="ripple-ring"/><div className="ripple-ring"/>
            <div className="ripple-center">🌙</div>
          </div>
          <div className="time-label">Right now</div>
          <Clock/>
          <p className="s2-subline">Time to drift. Put the feed down for something that actually rests you.</p>
          <div className="offer-card">
            <span className="offer-icon">🎧</span>
            <div>
              <div className="offer-title">ASMR wind-down</div>
              <div className="offer-sub">Sounds picked for your mood · 20 min</div>
            </div>
          </div>
          <button className="btn-primary" style={{maxWidth:'100%'}} onClick={()=>goTo(3)}>Start drifting</button>
          <button className="btn-ghost-sm" onClick={()=>goTo(1)}>Not tonight</button>
        </div>
      </div>

      {/* ── Screen 3 ── */}
      <div className={`screen s3 ${screen===3?'active':''}`}>
        <div className="s3-body">
          <div className="s3-eyebrow">Before we start</div>
          <h2 className="s3-headline">How are you feeling right now?</h2>
          <p className="s3-sub">We'll pick the right sounds for you.</p>

          <div className="mood-grid">
            {['stressed','anxious','tired','calm'].map(moodCard)}
          </div>

          {mood && (() => {
            const rec = MOOD_RECS[mood];
            const hiClass = (isIntense) ? 'hi-purple' : 'hi-teal';
            return (
              <div className="rec-strip">
                <div className="rec-label">Recommended for you</div>
                <div className="sound-chips">
                  {rec.hi.map(s => <span key={s} className={`chip ${hiClass}`}>{s}</span>)}
                  {rec.lo.map(s => <span key={s} className="chip lo">{s}</span>)}
                </div>
              </div>
            );
          })()}

          {mood && (
            <button className="btn-primary" style={{maxWidth:'100%'}} onClick={()=>goTo(4)}>
              Play these sounds
            </button>
          )}
        </div>
      </div>

      {/* ── Screen 4 ── */}
      <div className={`screen s4 ${screen===4?'active':''}`}>
        <div className="s4-body">
          <div className="s4-eyebrow">
            {isIntense ? 'Now playing · deep relief' : 'Now playing · calm sounds'}
          </div>

          <div className="vinyl-wrap">
            <div className={`vinyl ${playing?'spin':''}`}/>
            <div className="vinyl-hole">{currentTrack.id.includes('rain')?'🌧️':currentTrack.id.includes('storm')?'⛈️':currentTrack.id.includes('forest')?'🌲':'🌊'}</div>
          </div>

          <div className="track-name">{currentTrack.label.replace(/^.️?\s/,'')}</div>
          <div className="track-sub">{currentTrack.sub}</div>

          <EQ playing={playing}/>

          {/* Sound pills */}
          <div className="sound-section">
            <div className="sound-sec-label">{isIntense ? 'Sounds for stress relief' : 'Sounds for gentle sleep'}</div>
            <div className="sound-row">
              {soundSet.map(s => (
                <button
                  key={s.id}
                  className={`sound-pill ${track===s.id ? (isIntense?'active-purple':'active-teal') : ''}`}
                  onClick={() => { setTrack(s.id); setElapsed(0); }}
                >
                  {s.label}
                </button>
              ))}
            </div>
          </div>

          {/* THE play button */}
          <button className="play-btn" onClick={()=>setPlaying(p=>!p)}>
            {playing ? '⏸' : '▶'}
          </button>

          <div className="timer-row">
            <span>{fmt(elapsed)} elapsed</span>
            <span>{fmt(remaining)} left</span>
          </div>

          <button className="btn-outline-sm" onClick={()=>{setPlaying(false);goTo(5);}}>
            I'm ready for sleep →
          </button>
        </div>
      </div>

      {/* ── Screen 5 ── */}
      <div className={`screen s5 ${screen===5?'active':''}`}>
        <div className="s5-glow"/>
        <div className="s5-body">
          <div className="s5-moon">🌙</div>
          <p className="s5-message">
            {message.split('\n').map((l,i,a)=><React.Fragment key={i}>{l}{i<a.length-1&&<br/>}</React.Fragment>)}
          </p>
          <button className="btn-ghost" onClick={handleGoodnight}>Goodnight 🌙</button>
          <p className="s5-footer">See you tomorrow night.</p>
        </div>
      </div>

      <div className={`dim ${dimming?'on':''}`}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
