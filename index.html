<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Nightdrift</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f1a;
      --purple: #b8a9f8;
      --teal: #7ec8c8;
      --text: #e8e4f0;
      --text-dim: rgba(232, 228, 240, 0.5);
      --text-muted: rgba(232, 228, 240, 0.3);
      --surface: rgba(255, 255, 255, 0.05);
      --surface-border: rgba(255, 255, 255, 0.08);
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100%;
      overflow: hidden;
    }

    #root {
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: var(--bg);
    }

    .app-shell {
      width: 100%;
      max-width: 390px;
      height: 100dvh;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }

    /* Screen transitions */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .screen.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ── STARS ── */
    .stars-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── SCREEN 1 ── */
    .s1-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 28px 40px;
      min-height: 100%;
    }
    .s1-moon {
      font-size: 64px;
      margin-bottom: 36px;
      filter: drop-shadow(0 0 24px rgba(184, 169, 248, 0.5));
      animation: moon-pulse 4s ease-in-out infinite;
    }
    @keyframes moon-pulse {
      0%, 100% { filter: drop-shadow(0 0 24px rgba(184, 169, 248, 0.5)); }
      50%       { filter: drop-shadow(0 0 40px rgba(184, 169, 248, 0.8)); }
    }
    .s1-headline {
      font-family: 'DM Serif Display', serif;
      font-size: 38px;
      line-height: 1.15;
      text-align: center;
      color: var(--text);
      margin-bottom: 20px;
    }
    .s1-headline em {
      font-style: italic;
      color: var(--purple);
    }
    .s1-subline {
      font-size: 15px;
      line-height: 1.65;
      text-align: center;
      color: var(--text-dim);
      max-width: 300px;
      margin-bottom: 32px;
    }
    .pills {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 48px;
    }
    .pill {
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 13px;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }
    .cta-btn {
      width: 100%;
      max-width: 320px;
      padding: 18px 32px;
      border-radius: 999px;
      border: none;
      background: var(--purple);
      color: #0d0f1a;
      font-family: 'DM Sans', sans-serif;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
      box-shadow: 0 0 32px rgba(184, 169, 248, 0.35), 0 4px 24px rgba(184, 169, 248, 0.2);
      transition: box-shadow 0.2s, transform 0.1s;
      margin-bottom: 24px;
    }
    .cta-btn:active {
      transform: scale(0.98);
      box-shadow: 0 0 20px rgba(184, 169, 248, 0.25);
    }
    .s1-footer {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
    }

    /* ── SCREEN 2 ── */
    .s2-ripple-container {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 0;
    }
    .s2-ripple {
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      border: 1.5px solid rgba(184, 169, 248, 0.15);
      animation: ripple-out 3.6s ease-out infinite;
    }
    .s2-ripple:nth-child(2) { animation-delay: 1.2s; }
    .s2-ripple:nth-child(3) { animation-delay: 2.4s; }
    @keyframes ripple-out {
      0%   { transform: scale(0.6); opacity: 0.6; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    .s2-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 28px 48px;
      min-height: 100%;
    }
    .s2-time {
      font-family: 'DM Serif Display', serif;
      font-size: 72px;
      line-height: 1;
      color: var(--text);
      text-align: center;
      margin-bottom: 40px;
      letter-spacing: -0.02em;
    }
    .s2-headline {
      font-family: 'DM Serif Display', serif;
      font-size: 34px;
      line-height: 1.2;
      text-align: center;
      color: var(--text);
      margin-bottom: 14px;
    }
    .s2-subline {
      font-size: 15px;
      line-height: 1.65;
      text-align: center;
      color: var(--text-dim);
      max-width: 280px;
      margin-bottom: 40px;
    }
    .s2-card {
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: 20px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 320px;
      margin-bottom: 36px;
    }
    .s2-card-icon { font-size: 30px; }
    .s2-card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .s2-card-sub {
      font-size: 13px;
      color: var(--text-dim);
    }
    .s2-cta-wrap {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: auto;
    }
    .s2-primary {
      width: 100%;
      padding: 20px 32px;
      border-radius: 999px;
      border: none;
      background: var(--purple);
      color: #0d0f1a;
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 0 40px rgba(184, 169, 248, 0.4), 0 4px 24px rgba(184, 169, 248, 0.2);
      transition: box-shadow 0.2s, transform 0.1s;
    }
    .s2-primary:active {
      transform: scale(0.98);
    }
    .s2-secondary {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      padding: 4px 8px;
    }

    /* ── SCREEN 3 ── */
    .s3-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 28px 48px;
      min-height: 100%;
    }
    .s3-label {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 32px;
    }
    .vinyl-wrap {
      position: relative;
      width: 200px;
      height: 200px;
      margin-bottom: 28px;
    }
    .vinyl {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        #1a1c2e 0%, #252840 10%, #1a1c2e 20%,
        #252840 30%, #1a1c2e 40%, #252840 50%,
        #1a1c2e 60%, #252840 70%, #1a1c2e 80%,
        #252840 90%, #1a1c2e 100%
      );
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,255,255,0.05);
      transition: animation 0.3s;
    }
    .vinyl.spinning {
      animation: spin 4s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .vinyl-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 3px rgba(126, 200, 200, 0.2);
      font-size: 22px;
    }
    .track-name {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      text-align: center;
      color: var(--text);
      margin-bottom: 24px;
    }
    .sound-pills {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 28px;
    }
    .sound-pill {
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 14px;
      color: var(--text-dim);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .sound-pill.selected {
      background: rgba(126, 200, 200, 0.12);
      border-color: var(--teal);
      color: var(--teal);
    }

    /* Equalizer */
    .eq-bars {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 28px;
      margin-bottom: 28px;
    }
    .eq-bar {
      width: 4px;
      border-radius: 2px;
      background: var(--teal);
      opacity: 0.7;
      min-height: 4px;
    }
    .eq-bar.animated { animation: eq-bounce 0.7s ease-in-out infinite alternate; }
    .eq-bar:nth-child(1) { animation-duration: 0.5s; }
    .eq-bar:nth-child(2) { animation-duration: 0.65s; }
    .eq-bar:nth-child(3) { animation-duration: 0.4s; }
    .eq-bar:nth-child(4) { animation-duration: 0.8s; }
    .eq-bar:nth-child(5) { animation-duration: 0.55s; }
    .eq-bar:nth-child(6) { animation-duration: 0.7s; }
    @keyframes eq-bounce {
      from { height: 4px; }
      to   { height: 24px; }
    }

    .play-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: none;
      background: var(--teal);
      color: #0d0f1a;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 32px rgba(126, 200, 200, 0.35);
      transition: transform 0.1s, box-shadow 0.2s;
      margin-bottom: 24px;
    }
    .play-btn:active { transform: scale(0.95); }

    .timer-row {
      display: flex;
      gap: 24px;
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 28px;
    }
    .timer-row span { font-variant-numeric: tabular-nums; }

    .s3-goodnight {
      background: none;
      border: 1px solid var(--surface-border);
      border-radius: 999px;
      padding: 12px 28px;
      color: var(--text-dim);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .s3-goodnight:hover {
      border-color: rgba(255,255,255,0.15);
      color: var(--text);
    }

    /* ── SCREEN 4 ── */
    .s4-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 36px;
      min-height: 100%;
      text-align: center;
    }
    .s4-icon {
      font-size: 56px;
      margin-bottom: 36px;
      filter: drop-shadow(0 0 20px rgba(184, 169, 248, 0.4));
    }
    .s4-message {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      line-height: 1.4;
      color: var(--text);
      max-width: 300px;
      margin-bottom: 56px;
    }
    .s4-btn {
      padding: 18px 48px;
      border-radius: 999px;
      border: none;
      background: rgba(184, 169, 248, 0.12);
      border: 1px solid rgba(184, 169, 248, 0.25);
      color: var(--purple);
      font-family: 'DM Sans', sans-serif;
      font-size: 17px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .s4-btn:active { transform: scale(0.97); }

    /* Dim overlay for goodnight tap */
    .dim-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.8s ease;
    }
    .dim-overlay.dimming { opacity: 1; pointer-events: all; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const SOUNDS = [
      { id: 'rain',   label: '🌧️ Rain',   icon: '🌧️' },
      { id: 'fire',   label: '🔥 Fire',   icon: '🔥' },
      { id: 'ocean',  label: '🌊 Ocean',  icon: '🌊' },
      { id: 'forest', label: '🌲 Forest', icon: '🌲' },
    ];

    const GOODNIGHT_MESSAGES = [
      "That was yours.\nAll of it. Sleep well.",
      "You gave yourself\nsomething tonight. Good.",
      "Rest earned.\nPhone down. Goodnight.",
      "Tomorrow starts with tonight.\nYou did well.",
      "No guilt. No scroll.\nJust sleep. Goodnight.",
    ];

    const SESSION_SECS = 20 * 60;

    /* ─── Stars canvas ─── */
    function Stars() {
      const canvasRef = useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        let raf;
        const resize = () => {
          canvas.width = canvas.offsetWidth;
          canvas.height = canvas.offsetHeight;
        };
        resize();
        const stars = Array.from({ length: 90 }, () => ({
          x: Math.random(), y: Math.random(),
          r: Math.random() * 1.4 + 0.3,
          alpha: Math.random(),
          speed: Math.random() * 0.003 + 0.001,
          phase: Math.random() * Math.PI * 2,
        }));
        const draw = (t) => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          stars.forEach(s => {
            const a = 0.3 + 0.5 * Math.abs(Math.sin(t * s.speed + s.phase));
            ctx.beginPath();
            ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(232,228,240,${a})`;
            ctx.fill();
          });
          raf = requestAnimationFrame(draw);
        };
        raf = requestAnimationFrame(draw);
        window.addEventListener('resize', resize);
        return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
      }, []);
      return <canvas ref={canvasRef} className="stars-canvas" />;
    }

    /* ─── Clock ─── */
    function Clock() {
      const [time, setTime] = useState('');
      useEffect(() => {
        const fmt = () => {
          const d = new Date();
          let h = d.getHours(), m = d.getMinutes();
          const ampm = h >= 12 ? 'pm' : 'am';
          h = h % 12 || 12;
          return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
        };
        setTime(fmt());
        const id = setInterval(() => setTime(fmt()), 10000);
        return () => clearInterval(id);
      }, []);
      return <div className="s2-time">{time}</div>;
    }

    /* ─── Equaliser ─── */
    function EqBars({ playing }) {
      return (
        <div className="eq-bars">
          {[22, 14, 26, 10, 20, 16].map((h, i) => (
            <div
              key={i}
              className={`eq-bar ${playing ? 'animated' : ''}`}
              style={{ height: playing ? undefined : `${h * 0.3}px` }}
            />
          ))}
        </div>
      );
    }

    /* ─── Timer ─── */
    function fmt(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    }

    /* ─── App ─── */
    function App() {
      const [screen, setScreen] = useState(1);
      const [selectedSound, setSelectedSound] = useState('rain');
      const [playing, setPlaying] = useState(false);
      const [elapsed, setElapsed] = useState(0);
      const [dimming, setDimming] = useState(false);
      const [message] = useState(() => GOODNIGHT_MESSAGES[Math.floor(Math.random() * GOODNIGHT_MESSAGES.length)]);
      const timerRef = useRef(null);

      const goTo = useCallback((s) => {
        setScreen(s);
      }, []);

      // Timer logic
      useEffect(() => {
        if (playing) {
          timerRef.current = setInterval(() => {
            setElapsed(e => {
              if (e + 1 >= SESSION_SECS) {
                clearInterval(timerRef.current);
                setPlaying(false);
                goTo(4);
                return SESSION_SECS;
              }
              return e + 1;
            });
          }, 1000);
        } else {
          clearInterval(timerRef.current);
        }
        return () => clearInterval(timerRef.current);
      }, [playing, goTo]);

      // Reset timer when leaving player
      useEffect(() => {
        if (screen !== 3) {
          setPlaying(false);
          setElapsed(0);
        }
      }, [screen]);

      const handleGoodnight = () => {
        setDimming(true);
        setTimeout(() => {
          setDimming(false);
          setScreen(1);
          setElapsed(0);
          setPlaying(false);
        }, 3000);
      };

      const remaining = SESSION_SECS - elapsed;
      const soundObj = SOUNDS.find(s => s.id === selectedSound);

      return (
        <div className="app-shell">

          {/* ── Screen 1 ── */}
          <div className={`screen ${screen === 1 ? 'active' : ''}`}>
            <Stars />
            <div className="s1-inner">
              <div className="s1-moon">🌙</div>
              <h1 className="s1-headline">
                Your phone, but <em>slower.</em>
              </h1>
              <p className="s1-subline">
                You deserve that quiet moment before sleep. Nightdrift gives it back to you — without the scroll.
              </p>
              <div className="pills">
                <span className="pill">No guilt</span>
                <span className="pill">No effort</span>
                <span className="pill">Just you</span>
              </div>
              <button className="cta-btn" onClick={() => goTo(2)}>
                Try tonight →
              </button>
              <p className="s1-footer">No sign-up needed. Works right now.</p>
            </div>
          </div>

          {/* ── Screen 2 ── */}
          <div className={`screen ${screen === 2 ? 'active' : ''}`}>
            <div className="s2-ripple-container">
              <div className="s2-ripple" />
              <div className="s2-ripple" />
              <div className="s2-ripple" />
            </div>
            <div className="s2-inner">
              <Clock />
              <h2 className="s2-headline">Time to drift.</h2>
              <p className="s2-subline">
                Put the feed down for something that actually rests you.
              </p>
              <div className="s2-card">
                <span className="s2-card-icon">🎧</span>
                <div>
                  <div className="s2-card-title">ASMR wind-down</div>
                  <div className="s2-card-sub">Soft sounds · 20 min · effortless</div>
                </div>
              </div>
              <div className="s2-cta-wrap">
                <button className="s2-primary" onClick={() => goTo(3)}>
                  Start drifting
                </button>
                <button className="s2-secondary" onClick={() => goTo(1)}>
                  Not tonight
                </button>
              </div>
            </div>
          </div>

          {/* ── Screen 3 ── */}
          <div className={`screen ${screen === 3 ? 'active' : ''}`}>
            <div className="s3-inner">
              <p className="s3-label">Now playing</p>
              <div className="vinyl-wrap">
                <div className={`vinyl ${playing ? 'spinning' : ''}`} />
                <div className="vinyl-center">{soundObj?.icon}</div>
              </div>
              <div className="track-name">{soundObj?.id.charAt(0).toUpperCase() + soundObj?.id.slice(1)} sounds</div>

              <div className="sound-pills">
                {SOUNDS.map(s => (
                  <button
                    key={s.id}
                    className={`sound-pill ${selectedSound === s.id ? 'selected' : ''}`}
                    onClick={() => { setSelectedSound(s.id); setElapsed(0); }}
                  >
                    {s.label}
                  </button>
                ))}
              </div>

              <EqBars playing={playing} />

              <button className="play-btn" onClick={() => setPlaying(p => !p)}>
                {playing ? '⏸' : '▶'}
              </button>

              <div className="timer-row">
                <span>{fmt(elapsed)} elapsed</span>
                <span>{fmt(remaining)} left</span>
              </div>

              <button className="s3-goodnight" onClick={() => { setPlaying(false); goTo(4); }}>
                I'm ready for sleep →
              </button>
            </div>
          </div>

          {/* ── Screen 4 ── */}
          <div className={`screen ${screen === 4 ? 'active' : ''}`}>
            <div className="s4-inner">
              <div className="s4-icon">🌙</div>
              <p className="s4-message">
                {message.split('\n').map((line, i) => (
                  <React.Fragment key={i}>{line}{i === 0 && <br />}</React.Fragment>
                ))}
              </p>
              <button className="s4-btn" onClick={handleGoodnight}>
                Goodnight 🌙
              </button>
            </div>
          </div>

          {/* Dim overlay */}
          <div className={`dim-overlay ${dimming ? 'dimming' : ''}`} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
